apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: voice-gateway
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # Normalise l'interface TTS Gateway en OpenAI-compatible
    
    model_list:
      - model_name: tts-gateway-chatterbox
        litellm_params:
          model: custom/tts-gateway
          api_base: http://tts-gateway.voice-gateway.svc.cluster.local:8000
          api_key: ""
          max_tokens: 999999
          timeout: 60
      
      - model_name: tts-gateway-fallback
        litellm_params:
          model: custom/tts-gateway-fallback
          api_base: http://tts-gateway-fallback.voice-gateway.svc.cluster.local:8000
          api_key: ""
          timeout: 60

    router_settings:
      # Load balancing stratégies
      enable_load_balancing: true
      load_balancing_strategy: least_busy
      load_balancing_method: least_busy_requests
      
      # Retry policy
      retry_policy:
        retries: 3
        retry_delay: 1
        retry_timeout: 60
      
      # Fallback
      fallback_policy:
        fallback_on_status_codes: [429, 500, 502, 503, 504]
        fallback_on_timeouts: true
      
      # Request queuing
      enable_request_queueing: true
      max_queue_size: 1000

    # Rate limiting per consumer
    general_settings:
      master_key: ${LITELLM_MASTER_KEY}
      
      # Logging
      proxy_logs:
        - provider: generic
          custom_base_url: http://prometheus-pushgateway.monitoring:9091
          model: prometheus

    # Database for tracking (optional but recommended)
    database_connection_pool_config:
      pool_size: 5
      max_overflow: 10
      
    litellm_settings:
      # Timeout et retry defaults
      request_timeout: 60
      num_retries: 3
      context_window_fallback_ratio: 0.9

    # Healthcheck endpoint
    enable_prometheus_metrics: true
    prometheus_port: 8001

---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: voice-gateway
type: Opaque
stringData:
  # ⚠️ À changer en production via Sealed Secrets ou Vault
  master-key: "sk-litellm-prod-key-$(openssl rand -hex 16)"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: voice-gateway
  labels:
    app: litellm
    component: proxy
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
        component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8001"
    spec:
      # Spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - litellm
                topologyKey: kubernetes.io/hostname
      
      serviceAccountName: litellm
      
      containers:
        - name: litellm-proxy
          image: ghcr.io/berriai/litellm:main-latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 8001
              protocol: TCP
          
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            
            - name: LOG_LEVEL
              value: "INFO"
            
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector.tracing:4317"
            
            # For debugging
            - name: DEBUG
              value: "false"
          
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
            defaultMode: 0644

---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: voice-gateway
  labels:
    app: litellm
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8001
      targetPort: metrics
      protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: litellm
  namespace: voice-gateway
  labels:
    app: litellm
spec:
  host: litellm.apps.openshift.local
  to:
    kind: Service
    name: litellm
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: litellm-proxy
  namespace: voice-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: litellm-proxy
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm
  namespace: voice-gateway

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litellm
  namespace: voice-gateway
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litellm
  namespace: voice-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: litellm
subjects:
  - kind: ServiceAccount
    name: litellm
    namespace: voice-gateway
