apiVersion: v1
kind: ConfigMap
metadata:
  name: tts-gateway-config
  labels:
    app: tts-gateway
data:
  TTS_BACKEND: "chatterbox"           # change after POC decision
  TTS_DEVICE: "cuda"
  TTS_VOICES_DIR: "/app/voices"
  TTS_MODEL_CACHE_DIR: "/cache/huggingface"
  TTS_DEFAULT_VOICE_ID: "brand_default"
  TTS_MAX_TEXT_LENGTH: "2000"
  TTS_DEFAULT_SAMPLE_RATE: "24000"
  TTS_REQUEST_TIMEOUT_S: "30"
  TTS_LOG_LEVEL: "INFO"
