# NOTE: do NOT commit a real key. Apply this file with `oc create secret` or via SealedSecrets/Vault.
# Example only:
#
#   oc create secret generic tts-gateway-secrets \
#     --from-literal=admin-api-key="$(openssl rand -hex 32)"
#
apiVersion: v1
kind: Secret
metadata:
  name: tts-gateway-secrets
  labels:
    app: tts-gateway
type: Opaque
stringData:
  admin-api-key: "REPLACE_ME"
